server:
  name: "retrievr-mcp"
  http_addr: ":8099"
  log_level: "info"
  log_format: "json"

router:
  default_sources: ["arxiv", "s2", "openalex", "pubmed", "huggingface", "europmc", "crossref", "dblp", "ads"]
  per_source_timeout: "10s"
  dedup_enabled: true
  cache_enabled: true
  cache_ttl: "5m"
  cache_max_entries: 1000

sources:
  arxiv:
    enabled: true
    base_url: "http://export.arxiv.org/api/query"
    timeout: "15s"
    rate_limit: 0.33
    rate_limit_burst: 1

  pubmed:
    enabled: true
    api_key: ""
    timeout: "10s"
    rate_limit: 3.0
    rate_limit_burst: 3
    extra:
      tool: "retrievr-mcp"
      email: "contact@example.com"

  s2:
    enabled: true
    api_key: ""
    timeout: "10s"
    rate_limit: 1.0
    rate_limit_burst: 3

  openalex:
    enabled: true
    api_key: ""
    timeout: "10s"
    rate_limit: 10.0
    rate_limit_burst: 5
    extra:
      mailto: "contact@example.com"

  huggingface:
    enabled: true
    api_key: ""
    timeout: "10s"
    rate_limit: 10.0
    rate_limit_burst: 5
    extra:
      include_models: "true"
      include_datasets: "true"
      include_papers: "true"

  europmc:
    enabled: true
    timeout: "10s"
    rate_limit: 10.0
    rate_limit_burst: 5

  crossref:
    enabled: true
    timeout: "10s"
    rate_limit: 10.0
    rate_limit_burst: 5
    extra:
      mailto: "contact@example.com"

  dblp:
    enabled: true
    timeout: "10s"
    rate_limit: 5.0
    rate_limit_burst: 3

  ads:
    enabled: true
    api_key: ""                 # NASA ADS API key (required for search)
    timeout: "10s"
    rate_limit: 5.0
    rate_limit_burst: 3

  biorxiv:
    enabled: true
    timeout: "10s"
    rate_limit: 5.0
    rate_limit_burst: 3
    extra:
      servers: "biorxiv,medrxiv"

  # Cycle-2 Wave-1 providers.
  exa:
    enabled: false               # Set true + supply api_key (or RETRIEVR_EXA_API_KEY env) to activate
    api_key: ""
    timeout: "10s"
    rate_limit: 5.0
    rate_limit_burst: 5
    extra:
      default_type: "auto"       # auto | neural | keyword
      include_text: "true"       # fetch result.text inline (snippet enrichment)

  brave:
    enabled: false               # Set true + supply api_key (or RETRIEVR_BRAVE_API_KEY env)
    api_key: ""
    timeout: "10s"
    rate_limit: 1.0              # Free-tier soft cap; bump for Pro subscriptions
    rate_limit_burst: 1
    extra:
      country: "ALL"
      safesearch: "moderate"     # off | moderate | strict

  linkup:
    enabled: false               # EU-resident; primary admit under eu_strict
    api_key: ""                  # Bearer token; or RETRIEVR_LINKUP_API_KEY env
    timeout: "10s"
    rate_limit: 5.0
    rate_limit_burst: 5
    extra:
      depth: "standard"          # standard | deep (deep costs more)

  firecrawl:
    enabled: false
    api_key: ""                  # Bearer token; or RETRIEVR_FIRECRAWL_API_KEY env
    timeout: "15s"               # Scrape can be slow on heavy pages
    rate_limit: 2.0
    rate_limit_burst: 2
    extra:
      include_markdown: "false"  # "true" pulls per-result markdown bodies

  github:
    enabled: false
    api_key: ""                  # Fine-grained PAT (read-only public_repo); or RETRIEVR_GITHUB_API_KEY env
    timeout: "10s"
    rate_limit: 0.5              # 30 req/min PAT-authenticated search ceiling
    rate_limit_burst: 1
    extra:
      sort: "stars"
      order: "desc"

  wikipedia:
    enabled: true                # Free / no auth required
    timeout: "10s"
    rate_limit: 10.0
    rate_limit_burst: 5
    extra:
      lang: "en"                 # ISO 639-1
      user_agent: "retrievr/1.6 (+https://github.com/itsatony/retrievr-mcp; contact@example.com)"

  unpaywall:
    enabled: false               # Wired as enrichment hook via enrichment.unpaywall
    timeout: "10s"
    rate_limit: 5.0
    rate_limit_burst: 5
    extra:
      email: "contact@example.com"  # REQUIRED by Unpaywall TOS

  perplexity:
    enabled: false               # Wave-2 Sonar; bumps timeout (Sonar median 5-13s)
    api_key: ""                  # Bearer token; or RETRIEVR_PERPLEXITY_API_KEY env
    timeout: "20s"
    rate_limit: 1.0
    rate_limit_burst: 1
    extra:
      model: "sonar"             # sonar | sonar-pro | sonar-reasoning

  youtube:
    enabled: false               # v3 cycle 2 (v2.3.0). Set true + supply api_key or RETRIEVR_YOUTUBE_API_KEY env
    api_key: ""                  # YouTube Data API v3 key (Google Cloud project)
    timeout: "10s"
    rate_limit: 1.0              # Soft cap; real cap is daily quota (10k units = ~100 searches/key)
    rate_limit_burst: 1
    extra:
      safe_search: "moderate"    # none | moderate | strict
      # region_code: "DE"        # ISO 3166-1 alpha-2; uncomment to bias regional results
      # relevance_language: "en" # ISO 639-1

  scrapingdog_youtube:
    enabled: false               # v3 cycle 2 (v2.3.0). Paid fallback when youtube quota is exhausted. ~$0.005/query.
    api_key: ""                  # Scrapingdog API key; or RETRIEVR_SCRAPINGDOG_YOUTUBE_API_KEY env
    timeout: "15s"               # Scraping path can be slower than the official API
    rate_limit: 2.0
    rate_limit_burst: 2
    extra:
      country: "us"              # ISO 3166-1 alpha-2
      language: "en"             # ISO 639-1

  photon:
    enabled: false               # v3 cycle 3 (v2.4.0). Free, no auth. Set base_url to a self-hosted instance for higher volume.
    timeout: "10s"
    rate_limit: 2.0              # Public endpoint is throttled — bump on self-host
    rate_limit_burst: 2
    extra:
      # lang: "en"               # ISO 639-1; uncomment to default the output language
      # bias_lat: "52.5163"      # Berlin
      # bias_lon: "13.3777"

  tomtom:
    enabled: false               # v3 cycle 3 (v2.4.0). 2,500 free requests/day. Set api_key or RETRIEVR_TOMTOM_API_KEY env.
    api_key: ""
    timeout: "10s"
    rate_limit: 5.0
    rate_limit_burst: 5
    extra:
      # country_set: "DE,FR,NL"  # Comma-separated ISO 3166-1; uncomment to restrict to specific countries
      # language: "en-US"        # IETF BCP 47

  nominatim:
    enabled: false               # v3 cycle 3 (v2.4.0). Free, but STRICT 1 req/s policy on the public endpoint. Self-host for volume.
    timeout: "10s"
    rate_limit: 1.0              # HARD on the public endpoint — see operations.osmfoundation.org/policies/nominatim
    rate_limit_burst: 1
    extra:
      user_agent: "retrievr-mcp/2.4 (+https://github.com/itsatony/retrievr-mcp; REPLACE-WITH-YOUR-CONTACT@example.com)"  # REQUIRED by OSMF policy
      # accept_language: "en"
      # country_codes: "de,fr"

  wikimedia:
    enabled: false               # v3 cycle 4 (v2.5.0). Free, no auth. Wikimedia Commons image search.
    timeout: "10s"
    rate_limit: 5.0
    rate_limit_burst: 5
    extra:
      user_agent: "retrievr-mcp/2.5 (+https://github.com/itsatony/retrievr-mcp; REPLACE-WITH-YOUR-CONTACT@example.com)"

  europeana:
    enabled: false               # v3 cycle 4 (v2.5.0). EU cultural-heritage images. Free wskey on developer portal.
    api_key: ""                  # Europeana wskey; or RETRIEVR_EUROPEANA_API_KEY env
    timeout: "10s"
    rate_limit: 5.0
    rate_limit_burst: 5
    extra:
      profile: "standard"        # standard | minimal | rich | facets

  mastodon:
    enabled: false               # v3 cycle 5 (v2.6.0). Public-statuses search; no auth needed on v4+ instances.
    base_url: "https://mastodon.social"  # Default Germany-based instance. Override per-deployment.
    timeout: "10s"
    rate_limit: 5.0
    rate_limit_burst: 5
    extra:
      region: "EU"               # MUST match the configured instance's actual residency: EU | US | UK-adequacy | global | unknown

  bluesky:
    enabled: false               # v3 cycle 5 (v2.6.0). Public AT Protocol search via the AppView. No auth.
    timeout: "10s"
    rate_limit: 5.0
    rate_limit_burst: 5

  reddit:
    enabled: false               # v3 cycle 5 (v2.6.0). OAuth2 client_credentials. api_key format: <client_id>:<client_secret>.
    api_key: ""                  # "<client_id>:<client_secret>"; or RETRIEVR_REDDIT_API_KEY env
    timeout: "10s"
    rate_limit: 1.5              # 100 QPM free tier ≈ 1.67 req/s; leave headroom
    rate_limit_burst: 2
    extra:
      user_agent: "retrievr-mcp/2.6 (+https://github.com/itsatony/retrievr-mcp; REPLACE-WITH-YOUR-CONTACT@example.com)"  # Required by Reddit policy

  stackexchange:
    enabled: false               # v5 cycle 1 (v2.8.0). Free anonymous tier 300/day/IP; api_key lifts cap to 10k/day.
    api_key: ""                  # optional Stack Exchange app key; or RETRIEVR_STACKEXCHANGE_API_KEY env. Per-call override: credentials.stackexchange.
    timeout: "10s"
    rate_limit: 0.5              # well under 10k/day cap even with key; anonymous tier needs <300/day
    rate_limit_burst: 2
    extra:
      default_site: "stackoverflow"  # any Stack Exchange site slug: stackoverflow | serverfault | askubuntu | mathoverflow | superuser | ...

  hackernews:
    enabled: false               # v5 cycle 1 (v2.8.0). Algolia-hosted public mirror; no auth required.
    timeout: "10s"
    rate_limit: 5.0
    rate_limit_burst: 5

  zenodo:
    enabled: false               # v5 cycle 2 (v2.9.0). Free, no auth required. CERN-hosted, EU.
    timeout: "10s"
    rate_limit: 2.0              # Polite-pool rate; Zenodo has no published cap but recommends modest use.
    rate_limit_burst: 2

  core:
    enabled: false               # v5 cycle 2 (v2.9.0). Free with registration (https://core.ac.uk/services/api). UK adequacy.
    api_key: ""                  # CORE API key; or RETRIEVR_CORE_API_KEY env. Per-call override: credentials.core.
    timeout: "15s"
    rate_limit: 5.0              # CORE permits ~10 req/s with key; leave headroom.
    rate_limit_burst: 5

  openaire:
    enabled: false               # v5 cycle 2 (v2.9.0). Free; optional public-data token. EU, Greece.
    api_key: ""                  # Optional OpenAIRE public-data token; or RETRIEVR_OPENAIRE_API_KEY env. Per-call override: credentials.openaire.
    timeout: "15s"
    rate_limit: 2.0
    rate_limit_burst: 2

  wikidata:
    enabled: false               # v5 cycle 3 (v2.10.0). Free, throttled. wbsearchentities text-lookup.
    timeout: "10s"
    rate_limit: 2.0
    rate_limit_burst: 2

  datacite:
    enabled: false               # v5 cycle 3 (v2.10.0). Free, no auth required. EU (Hannover, DE).
    timeout: "15s"
    rate_limit: 5.0
    rate_limit_burst: 5

  orcid:
    enabled: false               # v5 cycle 3 (v2.10.0). Free with public-data token. US non-profit.
    api_key: ""                  # ORCID public-data API token; or RETRIEVR_ORCID_API_KEY env. Per-call override: credentials.orcid.
    timeout: "15s"
    rate_limit: 5.0
    rate_limit_burst: 5

  npm:
    enabled: false               # v5 cycle 4 (v2.11.0). Free, no auth. US-hosted.
    timeout: "10s"
    rate_limit: 5.0
    rate_limit_burst: 5

  pypi:
    enabled: false               # v5 cycle 4 (v2.11.0). Free, no auth; search via HTML page parse (no JSON search since XML-RPC retirement).
    timeout: "15s"
    rate_limit: 5.0
    rate_limit_burst: 5

  crates:
    enabled: false               # v5 cycle 4 (v2.11.0). Free, public; Rust Foundation policy requires contact UA and ~1 req/s.
    timeout: "15s"
    rate_limit: 1.0
    rate_limit_burst: 1
    extra:
      user_agent: "retrievr-mcp/2.11 (+https://github.com/itsatony/retrievr-mcp; REPLACE-WITH-YOUR-CONTACT@example.com)"  # Required by Rust Foundation crawler policy.

  pkggodev:
    enabled: false               # v5 cycle 4 (v2.11.0). Free, no auth; HTML-search-page parse (no JSON search API).
    timeout: "15s"
    rate_limit: 2.0
    rate_limit_burst: 2

  googlepatents:
    enabled: false               # v5 cycle 5 (v2.12.0). Free, no auth. Rides unofficial xhr/query endpoint; fragility documented in retrievr_v5.md §12.
    timeout: "15s"
    rate_limit: 1.0
    rate_limit_burst: 1

  epoops:
    enabled: false               # v5 cycle 5 (v2.12.0). Free with registration. EU (Munich). OAuth2 client_credentials.
    api_key: ""                  # Format: "consumer_key:consumer_secret". Or RETRIEVR_EPOOPS_API_KEY env. Per-call override: credentials.epoops.
    timeout: "30s"
    rate_limit: 1.0
    rate_limit_burst: 1

  courtlistener:
    enabled: false               # v5 cycle 5 (v2.12.0). Free, non-profit. Optional token bumps rate limit.
    api_key: ""                  # Optional CourtListener API token; or RETRIEVR_COURTLISTENER_API_KEY env. Per-call override: credentials.courtlistener.
    timeout: "15s"
    rate_limit: 5.0
    rate_limit_burst: 5

  eurlex:
    enabled: false               # v5 cycle 5 (v2.12.0). Free, no auth; HTML search-page parse. EU (Luxembourg).
    timeout: "20s"
    rate_limit: 2.0
    rate_limit_burst: 2

  gdelt:
    enabled: false               # v5 cycle 6 (v2.13.0). Free, no auth. Real-time news; documented 100 QPM cap.
    timeout: "20s"
    rate_limit: 1.0
    rate_limit_burst: 1

  iascholar:
    enabled: false               # v5 cycle 6 (v2.13.0). Free, no auth. OA scholarly aggregator.
    timeout: "20s"
    rate_limit: 3.0
    rate_limit_burst: 3

  wayback:
    enabled: false               # v5 cycle 6 (v2.13.0). Free, no auth. GET-only resolver — id format: wayback:<url>:<YYYYMMDD>.
    timeout: "15s"
    rate_limit: 5.0
    rate_limit_burst: 5
